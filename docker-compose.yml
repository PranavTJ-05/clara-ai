version: "3.8"

services:

  clara-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clara-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./changelogs:/app/changelogs
      - ./tasks:/app/tasks
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
    networks:
      - clara-net

  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
      - ./data:/data
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara2024
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_HOST=localhost
      - N8N_PORT=5678
    restart: unless-stopped
    networks:
      - clara-net
    depends_on:
      - clara-api

volumes:
  n8n_data:

networks:
  clara-net:
    driver: bridge