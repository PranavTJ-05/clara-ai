version: '3.8'

services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/home/node/data
      - ./scripts:/home/node/scripts
      - ./outputs:/home/node/outputs
      - ./changelogs:/home/node/changelogs
      - ./tasks.json:/home/node/tasks.json
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      # Pass through user API keys for the Python Scripts
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-groq/llama-3.1-8b-instant}
      # Re-enable File Trigger and Execute Command nodes
      - NODES_EXCLUDE=[]

  api:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    command: uvicorn scripts.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/home/node/scripts
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}

volumes:
  n8n_data: